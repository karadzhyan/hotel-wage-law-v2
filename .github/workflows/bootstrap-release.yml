name: Bootstrap verified v2 release

on:
  push:
    branches:
      - bootstrap/unified-platform-v2
    paths:
      - .bootstrap/READY

permissions:
  contents: write

concurrency:
  group: bootstrap-v2-release
  cancel-in-progress: false

jobs:
  publish:
    name: Reconstruct, verify, and publish release branch
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Check out transfer branch
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Reconstruct and verify release patch
        shell: bash
        run: |
          set -euo pipefail
          cat .bootstrap/release.patch.* > /tmp/hotel-wage-law-v2.patch
          actual="$(sha256sum /tmp/hotel-wage-law-v2.patch | awk '{print $1}')"
          expected="57adb3fa16ee656b68985b062c1f71c847a6f9c7b87792b536d1b92f3101323b"
          test "$actual" = "$expected"
          echo "Verified release patch: $actual"

      - name: Apply complete release source
        shell: bash
        run: |
          set -euo pipefail
          git apply --check /tmp/hotel-wage-law-v2.patch
          git apply /tmp/hotel-wage-law-v2.patch
          rm -rf .bootstrap .github/workflows/bootstrap-release.yml

      - name: Verify deterministic contracts and deployment paths
        shell: bash
        run: |
          set -euo pipefail
          npm test
          npm run check:pages
          npm run build
          git diff --exit-code -- docs

      - name: Commit verified release source
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add --all
          git commit -m "Publish Hotel Wage Law v2 verified platform"
          git push origin HEAD:bootstrap/unified-platform-v2
