name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Verify
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
      - name: Deterministic install
        run: npm ci --ignore-scripts --no-audit --no-fund
      - name: Unit, structural, and root-build verification
        run: npm run verify
      - name: Pages-path build verification
        run: npm run verify:pages
      - name: Upload verified Pages build
        uses: actions/upload-artifact@v7
        with:
          name: hotel-wage-law-v2-dist
          path: dist
          include-hidden-files: true
          if-no-files-found: error
          retention-days: 14

  browser:
    name: Browser and accessibility smoke
    needs: verify
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
      - name: Deterministic install
        run: npm ci --ignore-scripts --no-audit --no-fund
      - name: Install Chromium
        run: npx playwright install --with-deps chromium
      - name: Exercise routes, interactions, and accessibility
        run: npm run test:browser
      - name: Upload browser evidence
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report
          path: playwright-report
          if-no-files-found: error
          retention-days: 14
