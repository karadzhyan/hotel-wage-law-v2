name: Verify and merge v2 release

on:
  push:
    branches: [release/unified-platform-v2]
    paths: [.release/MERGE]

permissions:
  contents: write
  pull-requests: write

jobs:
  verify-and-merge:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
        with:
          ref: release/unified-platform-v2
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - name: Normalize release state
        run: |
          python - <<'PY'
          from pathlib import Path
          path = Path('src/main.js')
          text = path.read_text()
          text = text.replace("const factor=structure==='cash'?1.18:structure==='benefit'?.84:1;", "const factor = structure === 'cash' ? 1.18 : structure === 'benefit' ? .84 : 1;")
          path.write_text(text)
          Path('README.md').write_text('''# Hotel Wage Law v2\n\nA production-fidelity prototype and system specification for a hospitality wage-and-hour intelligence and control plane.\n\nThe platform connects verified authority to effective-dated rules, property applicability, governed matters, controls, evidence, and executive decisions.\n\nSee [PROJECT.md](PROJECT.md) for the product model, commands, architecture, implementation boundary, and relationship to the reference repository.\n\n```bash\nnpm install --ignore-scripts\nnpm run verify\n```\n\nThe repository is proprietary and temporarily public for review. Prototype facts, people, scores, ranges, and workflow states are illustrative. Legal content and calculation logic require attorney validation before production use.\n''')
          PY
          rm -f .release/NORMALIZE .release/MERGE
          rm -f .github/workflows/normalize-release.yml .github/workflows/merge-release.yml
      - run: npm install --ignore-scripts --no-audit --no-fund
      - name: Verify complete release
        run: npm run verify
        env:
          BASE_PATH: /hotel-wage-law-v2/
      - name: Commit normalized verified state
        run: |
          git config user.name "hotel-wage-law-release-bot"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          if ! git diff --cached --quiet; then
            git commit -m "Finalize verified Hotel Wage Law v2 release"
            git push origin HEAD:release/unified-platform-v2
          fi
      - name: Merge pull request
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh pr merge 1 --repo karadzhyan/hotel-wage-law-v2 --squash --delete-branch \
            --subject "Publish Hotel Wage Law v2 unified control-plane prototype" \
            --body "Verified with deterministic tests, structural checks, and the production static build."
