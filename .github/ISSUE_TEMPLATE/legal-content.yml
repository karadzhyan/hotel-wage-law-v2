name: Legal content or rule change
about: Propose a sourced legal-content, rule, effective-date, or calculation update.
title: "[Legal] "
labels: []
body:
  - type: input
    id: authority
    attributes:
      label: Authority and source version
      placeholder: Statute, regulation, ordinance, case, guidance, or approved source identifier
    validations:
      required: true
  - type: input
    id: period
    attributes:
      label: Jurisdiction and effective period
    validations:
      required: true
  - type: textarea
    id: delta
    attributes:
      label: Proposed legal delta
      description: Identify the proposition, coverage predicate, exception, calculation, remedy, or interpretation that changes.
    validations:
      required: true
  - type: textarea
    id: dependencies
    attributes:
      label: Affected dependencies
      description: List pages, rules, tools, fixtures, properties, findings, controls, and decisions that require review.
    validations:
      required: true
  - type: textarea
    id: uncertainty
    attributes:
      label: Ambiguity, factual dependency, and review state
      description: Disclose competing interpretations, missing facts, and required attorney review.
    validations:
      required: true
